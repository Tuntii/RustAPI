services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rustapi
      POSTGRES_PASSWORD: rustapi
      POSTGRES_DB: rustapi_cloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustapi -d rustapi_cloud"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
